# Qwen3.5-397B-A17B (MoE) steering config
# Same qwen3_5_moe architecture as 122B, scaled up:
#   512 experts, 10 routed + 1 shared, 60 layers, hidden=4096, expert_dim=1024
# BNB 4-bit: ~215-220GB — 3x RTX PRO 6000 (294GB)

[model]
dtype_fallback_order = ["bfloat16"]
quant_method = "bnb_4bit"
use_torch_compile = false
device_map = "auto"
# Force all layers on GPU — 4-bit model (~215GB) fits in 3xA100 (255GB).
# Without this, accelerate over-estimates with int8 and spills to CPU,
# which BNB 4-bit doesn't support.
max_memory = {0 = "80GiB", 1 = "80GiB", 2 = "80GiB"}

[inference]
batch_size = 0
max_batch_size = 4
max_gen_tokens = 50

[steering]
vector_method = "mean"
decay_kernel = "linear"
orthogonal_projection = true
weight_normalization = "none"
# MoE: wider weight range (same as 122B)
strength_range = [1.0, 10.0]

[optimization]
num_trials = 25
num_warmup_trials = 10
checkpoint_dir = "checkpoints_397b"

[kl]
scale = 1.0
token_count = 3
target = 0.01
prune_threshold = 5.0

[detection]
llm_judge = true
llm_judge_model = "google/gemini-3.1-flash-lite-preview"
llm_judge_batch_size = 10
llm_judge_concurrency = 10

[display]
print_responses = false
print_residual_geometry = false
plot_residuals = false

non_interactive = true

[benign_prompts]
dataset = "datasets/good_1000"
split = "train[:800]"
column = "prompt"

[target_prompts]
dataset = "datasets/harmful_1000"
split = "train[:800]"
column = "prompt"

[benign_eval_prompts]
dataset = "datasets/good_1000"
split = "train[800:]"
column = "prompt"

[target_eval_prompts]
dataset = "datasets/harmful_1000"
split = "train[800:]"
column = "prompt"
