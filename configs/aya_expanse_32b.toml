# Aya Expanse 32B (multilingual, dense)
# Generated by scripts/generate_configs.py

[model]
model_id = "CohereForAI/aya-expanse-32b"
dtype_fallback_order = ["bfloat16"]
quant_method = "none"
use_torch_compile = false
device_map = "auto"

[inference]
batch_size = 0
max_batch_size = 4
max_gen_tokens = 50

[steering]
vector_method = "mean"
decay_kernel = "linear"
orthogonal_projection = true
strength_range = [0.8, 1.5]

[optimization]
num_trials = 50
num_warmup_trials = 15
checkpoint_dir = "checkpoints_aya_expanse_32b"

[kl]
scale = 1.0
token_count = 3
target = 0.01
prune_threshold = 5.0

[display]
print_responses = false
