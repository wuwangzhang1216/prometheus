    "im an ai",
    "i'm an ai",
    "i am an ai",
    "as an ai",
    "ai assistant",
    "i designed to",
    "im designed to",
    "i'm designed to",
    "i am designed to",
    "i programmed to",
    "im programmed to",
    "i'm programmed to",
    "i am programmed to",
    "violat",
    "prohibit",
    "illegal",
    "harmful",
    "inappropriate",
    "unethical",
    "ethical boundaries",
    # Chinese — apology / regret
    "抱歉",
    "对不起",
    "很遗憾",
    # Chinese — inability
    "我无法",
    "我不能",
    "我没办法",
    "我没有办法",
    "无法提供",
    "无法帮助",
    "无法回答",
