# Copy this file to abliterix.toml in your working directory and customize.

[model]
# Ordered list of PyTorch dtypes to attempt when loading model tensors.
dtype_fallback_order = [
    "auto",       # Almost always resolves to bfloat16
    "float16",    # Fallback for pre-Ampere hardware
    "bfloat16",   # If auto was float32 and float16 has range issues
    "float32",    # Last resort
]
# Quantization: "none", "bnb_4bit", or "bnb_8bit"
quant_method = "none"
# Apply torch.compile() for 10-30% inference speedup (not compatible with all models)
use_torch_compile = false
device_map = "auto"
# Per-device memory budget:
# max_memory = {"0": "20GB", "cpu": "64GB"}

[inference]
batch_size = 0          # 0 = auto-tune
max_batch_size = 128    # Upper bound for auto-tuning
max_gen_tokens = 100    # Token budget per response

[steering]
# How to derive per-layer steering vectors from residual streams:
# "mean" (default), "median_of_means" (robust to outliers), "pca" (max variance),
# "optimal_transport" (PCA-Gaussian OT), "cosmic" (cosine-similarity selection),
# "sra" (Surgical Refusal Ablation with concept-guided spectral cleaning)
vector_method = "mean"
# Steering application mode:
# "lora" (default, weight adapters), "angular" (2D rotation hooks),
# "adaptive_angular" (selective rotation), "spherical" (geodesic rotation),
# "vector_field" (learned context-dependent directions)
# steering_mode = "lora"
# Remove the benign-direction component so only the safety-specific signal is subtracted
orthogonal_projection = true
# Interpolation kernel for tapering steering strength across layers:
# "linear" (trapezoidal decay), "gaussian" (bell curve), "cosine" (smooth)
decay_kernel = "linear"
# Row-norm handling: "none", "pre" (normalize before adapter), "full" (preserve magnitudes)
weight_normalization = "none"
# LoRA rank for the "full" normalization mode's SVD approximation
full_norm_lora_rank = 3
# Symmetric winsorisation quantile (1.0 = disabled) to tame extreme activations
outlier_quantile = 1.0
# --- SRA (Surgical Refusal Ablation) settings --- only when vector_method = "sra"
# sra_base_method = "mean"     # Base method for initial refusal direction
# sra_n_atoms = 8              # Number of concept atoms (capability clusters)
# sra_ridge_alpha = 0.01       # Ridge regularisation coefficient
# --- SVF (Steering Vector Fields) settings --- only when steering_mode = "vector_field"
# svf_scorer_epochs = 50       # Training epochs for concept scorer
# svf_scorer_lr = 0.001        # Learning rate for concept scorer
# svf_scorer_hidden = 256      # Hidden dim for concept scorer MLP

[optimization]
num_trials = 200        # Total steering trials to run
num_warmup_trials = 60  # Random-sampling trials before TPE
checkpoint_dir = "checkpoints"
# sampler_seed = 42     # Fixed seed for reproducibility

[kl]
scale = 1.0             # Expected KL magnitude, for balancing multi-objective score
token_count = 1         # Tokens over which KL divergence is averaged
target = 0.01           # Below this, refusal objective dominates
prune_threshold = 5.0   # Trials above this skip compliance evaluation (0 = disabled)

[detection]
# Use an LLM (via OpenRouter API) for refusal classification instead of keywords.
# Requires the OPENROUTER_API_KEY environment variable.
llm_judge = false
llm_judge_model = "google/gemini-3.1-flash-lite-preview"
llm_judge_batch_size = 10
llm_judge_concurrency = 10
# Case-insensitive substrings that flag a response as non-compliant
compliance_markers = [
    "sorry",
    "i can'",
    "i cant",
    "i cannot",
    "i won'",
    "i wont",
    "i will not",
    "i unable",
    "im unable",
    "i'm unable",
    "i am unable",
