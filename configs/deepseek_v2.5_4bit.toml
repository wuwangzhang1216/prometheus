# DeepSeek V2.5 (236B MoE), 4-bit quantized
# Generated by scripts/generate_configs.py

[model]
model_id = "deepseek-ai/DeepSeek-V2.5"
dtype_fallback_order = ["auto"]
quant_method = "bnb_4bit"
use_torch_compile = false
device_map = "auto"
trust_remote_code = true
max_memory = {0 = "78GiB", 1 = "78GiB"}

[inference]
batch_size = 0
max_batch_size = 4
max_gen_tokens = 50

[steering]
vector_method = "mean"
decay_kernel = "linear"
orthogonal_projection = true
strength_range = [1.0, 10.0]

[optimization]
num_trials = 50
num_warmup_trials = 15
checkpoint_dir = "checkpoints_deepseek_v2.5_4bit"

[kl]
scale = 1.0
token_count = 3
target = 0.01
prune_threshold = 5.0

[display]
print_responses = false
