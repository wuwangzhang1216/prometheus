# Devstral-Small-2-24B-Instruct (Dense) steering config
# Architecture: 40 layers, dense transformer with GQA
# 24B params (all active), hidden=5120
# BF16: ~47GB — fits A100 80GB

[model]
model_id = "mistralai/Devstral-Small-2-24B-Instruct-2512"
dtype_fallback_order = ["bfloat16"]
quant_method = "none"
use_torch_compile = false
device_map = "auto"
trust_remote_code = true
max_memory = {0 = "78GiB"}

[inference]
batch_size = 0          # auto-tune
max_batch_size = 8
max_gen_tokens = 50

[steering]
vector_method = "mean"
decay_kernel = "linear"
orthogonal_projection = true
weight_normalization = "none"

[optimization]
num_trials = 50
num_warmup_trials = 15
checkpoint_dir = "checkpoints_devstral_24b"

[kl]
scale = 1.0
token_count = 3
target = 0.01
prune_threshold = 5.0

[detection]
llm_judge = true
llm_judge_model = "google/gemini-3.1-flash-lite-preview"
llm_judge_batch_size = 10
llm_judge_concurrency = 6

[display]
print_responses = false
print_residual_geometry = false
plot_residuals = false

non_interactive = true

[benign_prompts]
dataset = "datasets/good_500"
split = "train[:400]"
column = "prompt"

[target_prompts]
dataset = "datasets/harmful_500"
split = "train[:400]"
column = "prompt"

[benign_eval_prompts]
dataset = "datasets/good_500"
split = "train[400:]"
column = "prompt"

[target_eval_prompts]
dataset = "datasets/harmful_500"
split = "train[400:]"
column = "prompt"
