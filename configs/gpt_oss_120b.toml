# GPT-OSS-120B (MoE) steering config
# Architecture: 36 layers, 128 routed experts, top-4, no shared experts
# Alternating sliding_attention / full_attention layers
# 120B total / 5.1B active, hidden=2880, intermediate=2880
# MXFP4: ~60GB — fits 4x H100 easily

[model]
model_id = "openai/gpt-oss-120b"
dtype_fallback_order = ["bfloat16"]
quant_method = "none"
use_torch_compile = false
device_map = "auto"
trust_remote_code = true
max_memory = {0 = "78GiB", 1 = "78GiB"}

[inference]
batch_size = 0          # auto-tune
max_batch_size = 8
max_gen_tokens = 50

[steering]
vector_method = "mean"
decay_kernel = "linear"
orthogonal_projection = true
weight_normalization = "none"
# MoE: wider strength range (small intermediate=2880)
strength_range = [1.0, 10.0]

[optimization]
num_trials = 50
num_warmup_trials = 15
checkpoint_dir = "checkpoints_gpt_oss_120b"

[kl]
scale = 1.0
token_count = 3
target = 0.01
prune_threshold = 5.0

[detection]
llm_judge = true
llm_judge_model = "google/gemini-3.1-flash-lite-preview"
llm_judge_batch_size = 10
llm_judge_concurrency = 6

[display]
print_responses = false
print_residual_geometry = false
plot_residuals = false

non_interactive = true

[benign_prompts]
dataset = "datasets/good_500"
split = "train[:400]"
column = "prompt"

[target_prompts]
dataset = "datasets/harmful_500"
split = "train[:400]"
column = "prompt"

[benign_eval_prompts]
dataset = "datasets/good_500"
split = "train[400:]"
column = "prompt"

[target_eval_prompts]
dataset = "datasets/harmful_500"
split = "train[400:]"
column = "prompt"
