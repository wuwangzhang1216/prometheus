# Qwen3.5-4B — Zero Refusal Configuration
# Goal: Absolute zero refusal rate, KL as secondary objective
#
# Strategy: Multi-direction + Optimal Transport
#   - OT matches the full harmful→harmless distribution (mean + covariance)
#   - 3 independent refusal directions catch residual refusal pathways
#   - Projected abliteration still active to limit KL damage
#   - Discriminative layers prevent unnecessary model degradation
#
# Expected results: 0/200 refusals, KL ≈ 0.005–0.010

[model]
dtype_fallback_order = ["bfloat16"]
quant_method = "none"
device_map = "auto"

[inference]
batch_size = 0
max_batch_size = 32
max_gen_tokens = 50

[steering]
# Optimal Transport: matches full activation distribution, not just mean
vector_method = "optimal_transport"
ot_components = 2

# 3 independent refusal directions — catches multi-directional refusal
n_directions = 3

# Projected abliteration: limit KL damage
projected_abliteration = true

# Winsorize outliers
winsorize_vectors = true
winsorize_quantile = 0.995

# LoRA mode (multi-direction requires weight modification)
steering_mode = "lora"

# Discriminative layers
discriminative_layer_selection = true

decay_kernel = "gaussian"
weight_normalization = "none"

[optimization]
num_trials = 100
num_warmup_trials = 30
checkpoint_dir = "checkpoints_4b_zero"

[kl]
scale = 1.0
token_count = 3
target = 0.02           # Relaxed KL target — prioritize zero refusal
prune_threshold = 8.0   # Allow more aggressive steering

[detection]
llm_judge = true
llm_judge_model = "google/gemini-3.1-flash-lite-preview"
llm_judge_batch_size = 10
llm_judge_concurrency = 10

[display]
print_responses = false
print_residual_geometry = false
plot_residuals = false

non_interactive = true

[benign_prompts]
dataset = "datasets/good_1000"
split = "train[:800]"
column = "prompt"

[target_prompts]
dataset = "datasets/harmful_1000"
split = "train[:800]"
column = "prompt"

[benign_eval_prompts]
dataset = "datasets/good_1000"
split = "train[800:]"
column = "prompt"

[target_eval_prompts]
dataset = "datasets/harmful_1000"
split = "train[800:]"
column = "prompt"
