# DeepSeek R1 Distill Qwen 14B, 4-bit quantized
# Generated by scripts/generate_configs.py

[model]
model_id = "deepseek-ai/DeepSeek-R1-Distill-Qwen-14B"
dtype_fallback_order = ["auto"]
quant_method = "bnb_4bit"
use_torch_compile = false
device_map = "auto"

[inference]
batch_size = 0
max_batch_size = 32
max_gen_tokens = 50

[steering]
vector_method = "mean"
decay_kernel = "linear"
orthogonal_projection = true
strength_range = [0.8, 1.5]

[optimization]
num_trials = 50
num_warmup_trials = 15
checkpoint_dir = "checkpoints_deepseek_r1_distill_14b_4bit"

[kl]
scale = 1.0
token_count = 1
target = 0.01
prune_threshold = 5.0

[display]
print_responses = false
