# DeepSeek V2 Lite Chat (16B MoE)
# Generated by scripts/generate_configs.py

[model]
model_id = "deepseek-ai/DeepSeek-V2-Lite-Chat"
dtype_fallback_order = ["bfloat16"]
quant_method = "none"
use_torch_compile = false
device_map = "auto"
trust_remote_code = true

[inference]
batch_size = 0
max_batch_size = 8
max_gen_tokens = 50

[steering]
vector_method = "mean"
decay_kernel = "linear"
orthogonal_projection = true
strength_range = [1.0, 10.0]

[optimization]
num_trials = 50
num_warmup_trials = 15
checkpoint_dir = "checkpoints_deepseek_v2_lite"

[kl]
scale = 1.0
token_count = 1
target = 0.01
prune_threshold = 5.0

[display]
print_responses = false
